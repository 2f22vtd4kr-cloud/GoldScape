<!DOCTYPE html>
<html lang="ru" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>EstateofMind | Зарубежная недвижимость</title>
    <script>
      try {
        var t = localStorage.getItem('eom-theme') || 'dark';
        if (t === 'light') document.documentElement.classList.remove('dark');
        else document.documentElement.classList.add('dark');
      } catch(e) {}
    </script>
    <meta name="description" content="EstateofMind — инвестиции в зарубежную недвижимость с полным юридическим сопровождением. ОАЭ, Турция, Кипр, Грузия." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Oxanium:wght@400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" />

    <!-- Critical first-paint styles: the loading state looks like the real hero -->
    <style>
      *, *::before, *::after { box-sizing: border-box; }

      html, body {
        min-height: 100vh;
        background: #080808;
        color: #ffffff;
      }

      /* Full-viewport placeholder shown before React mounts (#root is still empty) */
      #root:empty {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100dvh;
        background-color: #080808;
      }

      /* Wordmark — matches the actual React hero's chrome-text treatment */
      #root:empty::after {
        content: 'EstateofMind';
        position: relative;
        z-index: 2;
        font-family: 'Oxanium', sans-serif;
        font-weight: 600;
        font-size: 8vw;
        letter-spacing: 0.02em;
        line-height: 1;
        background: linear-gradient(135deg, #ffffff 0%, #d8d8d8 25%, #888888 50%, #cccccc 75%, #ffffff 100%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        color: transparent;
        user-select: none;
      }
      
      html:not(.dark) #root:empty {
        background-color: #FAF9F6;
      }
      html:not(.dark) #root:empty::after {
        background: linear-gradient(135deg, #2a2a28 0%, #787470 25%, #484844 50%, #8c8884 75%, #2a2a28 100%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        color: transparent;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
